author: VenceChing
date: 2026-05-04
question: |
  某工程師在實作支援 fastcommit 的 recovery 模組時，為最大化硬碟讀取頻寬，將系統設計為平行處理架構：
  Thread A 負責掃描並 replay JBD2 的 physical slow commit。
  Thread B 同時掃描並 replay FCLog。
  此系統架構設計可能造成甚麼問題？
options:
  - text: "Physical block 的寫入影像覆寫 logical 操作的結果，導致 metadata 狀態退回舊版本。"
    correct: true
    explanation: |
      Fastcommit 之 logical 操作依賴 JBD2 所還原的 block image。平行處理時若 thread B 先完成，thread A 較晚完成的 physical replay 會直接蓋掉 thread B 的 logical 修改。
  - text: "Logical replay 早於 data block 寫入，導致系統回傳未初始化之區塊，產生資安漏洞。"
    correct: false
    explanation: |
      預設的 ordered mode 保證實體 data 必定於寫入 journal 之前被 flush 進 disk，因此資安風險已排除。
  - text: "兩個 thread 交錯發出 i/o 請求，導致單一 sector 寫入之 atomic 特性失效，破壞 commit record 之 atomicity boundary。"
    correct: false
    explanation: |
      Commit record 的 atomicity boundary 作用於系統正常運行且寫入 journal 的當下。進入 recovery 階段時，journal 並不會被寫入或修改，不影響已存在於 journal 內的 commit record。
  - text: "兩個 thread 同時寫回正式位置會干擾 journal 寫入指標的重置，導致回收空間時誤將尚未 replay 的區塊標示為可用，引發 checkpoint 衝突。"
    correct: false
    explanation: |
      Checkpoint 是將 committed 內容搬回正式位置並重置指標的動作。而在 recovery 階段，系統僅是讀取 journal 內容進行 replay，此時並沒有 journal 空間釋放需求，指標的重置必須等待所有 replay 操作安全完成且系統成功掛載後才會執行。