author: VenceChing
date: 2026-04-21
question: |
  系統實作了 IVF-PQ 架構來搜尋十億筆向量，目前參數為：$C=30000$, $M=8, k^*=256$, `nprobe=64`。
  上線後發現 Recall@10 只有 65%，不符合業務要求的 85%。但目前的 P99 Latency 表現極佳，僅需 5ms (最低可接受值為 50ms)。同時，伺服器記憶體已達 90% 占用。
  在不增加靜態記憶體耗用的前提下，應該採取下列哪一種參數調整策略？
options:
  - text: "大幅降低 $M$ 值 (例如從 8 降至 4)，藉此將每筆向量的 PQ Code 從 8 bytes 減半為 4 bytes。然後將省下的 4GB 記憶體用來增加 IVF 的 Coarse Cluster 數量 ($C$)，以提高初步篩選的精準度。"
    correct: false
    explanation: |
      降低 $M$ 意味著每個 Sub-vector 要代表的維度變多（從 16 維變成 32 維），這會讓 PQ 的量化誤差急遽放大。即使 Coarse Cluster 變多，底層比對的資料本質已經失真，最終的 Recall 仍會降低。
  - text: "維持所有靜態參數 ($M, k^*, C$) 不變，在線上查詢階段，將 `nprobe` 從 64 增至 500。利用目前極寬裕的 Latency 空間，以掃描更多邊界資料來換取 Recall。"
    correct: true
    explanation: |
      正確的動態權衡策略。`nprobe` 是 Query-time 的動態參數，調高它只會增加 CPU 掃描 Inverted List 的運算時間 (Latency 上升)，不影響硬碟或記憶體的靜態 Index 大小。由於 Latency 還有 45ms 的裕度，可以用運算時間換取搜尋範圍。
  - text: "維持所有參數不變，但將 ADC 改為精確度稍差但速度更快的 SDC。利用 SDC 省下的運算時間，將所有的 `nprobe` 開到最大 (掃描全部 30000 個 Cluster) 增加準確度，進而提升 Recall。"
    correct: false
    explanation: |
      IVF 的目的就是避免全表掃描。如果將 `nprobe` 開到滿，IVF 就失去了意義，且 SDC 本身帶來的雙重量化誤差極大，即便掃描全域，其最終的 Recall 也可能比局部掃描的 ADC 來得差。
  - text: "保持現有架構，但在 Inverted List 中針對每一筆資料額外儲存一個 4 bytes 的 Residual Vector Norm (量化誤差補償值)。在 ADC 計算完畢後扣除誤差，就能在不改變搜尋路徑下拉高 Recall。"
    correct: false
    explanation: |
      技術上可能可行，但十億筆資料每筆增加 4 bytes，會導致靜態記憶體 footprint 直接暴增 4GB。在記憶體已達 90% 高水位的環境下，這會直接引發 OOM (Out of Memory) 等問題。